<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滋补品详情页 - 供应链维度选择器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .instruction {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #555;
        }
        .instruction strong {
            color: #667eea;
        }
        .dimension-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 25px;
        }
        @media (max-width: 600px) {
            .dimension-grid { grid-template-columns: 1fr; }
        }
        .dimension-card {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .dimension-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.15);
        }
        .dimension-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef1ff 100%);
        }
        .dimension-card.selected::after {
            content: "✓";
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .dimension-card input[type="checkbox"] {
            display: none;
        }
        .dimension-number {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .dimension-card.selected .dimension-number {
            background: #f5576c;
        }
        .dimension-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .dimension-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        .dimension-examples {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            font-style: italic;
        }
        .counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        .counter .count {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }
        .counter .limit {
            color: #f5576c;
        }
        .btn-area {
            text-align: center;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .result {
            display: none;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .result.show { display: block; }
        .result h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .result-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
        }
        .result-item .title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .result-item .desc {
            font-size: 13px;
            color: #666;
        }
        .copy-hint {
            margin-top: 15px;
            padding: 12px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 13px;
            color: #856404;
        }
        .btn-copy {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-copy:hover { background: #218838; }
        .btn-reset {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 10px;
            transition: background 0.3s;
        }
        .btn-reset:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>滋补品详情页 - 供应链维度选择器</h1>
            <p>选择你产品最具优势的维度，锚定差异化方向</p>
        </div>
        <div class="content">
            <div class="instruction">
                <strong>操作说明：</strong>从以下6个供应链维度中，勾选你产品最具优势的 <strong>1-3个</strong>。
                这将作为详情页文案的差异化锚点，避免空泛指令，把卖点锚定在供应链事实而非营销想象。
            </div>

            <div class="counter">
                已选择 <span class="count" id="count">0</span> / <span class="limit">3</span> 个维度
            </div>

            <div class="dimension-grid">
                <label class="dimension-card" data-id="1">
                    <input type="checkbox" name="dimension" value="1">
                    <div class="dimension-number">1</div>
                    <div class="dimension-title">品种与种质</div>
                    <div class="dimension-desc">品种来源、种质优劣、品种选育历史</div>
                    <div class="dimension-examples">如：道地品种vs普通品种、种质认证、地理标志</div>
                </label>

                <label class="dimension-card" data-id="2">
                    <input type="checkbox" name="dimension" value="2">
                    <div class="dimension-number">2</div>
                    <div class="dimension-title">产地与生长环境</div>
                    <div class="dimension-desc">道地产区、土壤条件、气候环境</div>
                    <div class="dimension-examples">如：河南焦作、宁夏中宁、青海柴达木</div>
                </label>

                <label class="dimension-card" data-id="3">
                    <input type="checkbox" name="dimension" value="3">
                    <div class="dimension-number">3</div>
                    <div class="dimension-title">种植方式</div>
                    <div class="dimension-desc">有机、野生、仿野生、常规种植等栽培模式</div>
                    <div class="dimension-examples">如：有机认证、无农药、种植密度管理</div>
                </label>

                <label class="dimension-card" data-id="4">
                    <input type="checkbox" name="dimension" value="4">
                    <div class="dimension-number">4</div>
                    <div class="dimension-title">生长年限与采收时间</div>
                    <div class="dimension-desc">药材的生长年份、采收季节、采收时机</div>
                    <div class="dimension-examples">如：3年vs1年、霜降后采收、头茬果</div>
                </label>

                <label class="dimension-card" data-id="5">
                    <input type="checkbox" name="dimension" value="5">
                    <div class="dimension-number">5</div>
                    <div class="dimension-title">药材规格与部位</div>
                    <div class="dimension-desc">等级划分、部位选择、规格标准</div>
                    <div class="dimension-examples">如：特级vs一级、根vs茎vs叶、果实大小</div>
                </label>

                <label class="dimension-card" data-id="6">
                    <input type="checkbox" name="dimension" value="6">
                    <div class="dimension-number">6</div>
                    <div class="dimension-title">产地加工与炮制</div>
                    <div class="dimension-desc">产地初加工、传统炮制工艺、古法制作</div>
                    <div class="dimension-examples">如：九蒸九晒、柴火慢蒸、手工切片</div>
                </label>
            </div>

            <div class="btn-area">
                <button class="btn-confirm" id="btnConfirm" disabled onclick="confirmSelection()">
                    确认选择，生成指令
                </button>
            </div>

            <div class="result" id="result">
                <h3>已选择的维度：</h3>
                <div id="resultItems"></div>
                <div class="copy-hint">
                    请将以下内容复制到 Claude 对话中，作为详情页文案生成的起点：
                </div>
                <div style="margin-top: 10px;">
                    <textarea id="outputText" readonly style="width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; resize: none;"></textarea>
                </div>
                <button class="btn-copy" onclick="copyText()">复制指令</button>
                <button class="btn-reset" onclick="resetSelection()">重新选择</button>
            </div>
        </div>
    </div>

    <script>
        const dimensionData = {
            1: {
                title: "品种与种质",
                desc: "品种来源、种质优劣、品种选育历史",
                examples: "道地品种vs普通品种、种质认证、地理标志"
            },
            2: {
                title: "产地与生长环境",
                desc: "道地产区、土壤条件、气候环境",
                examples: "河南焦作、宁夏中宁、青海柴达木"
            },
            3: {
                title: "种植方式",
                desc: "有机、野生、仿野生、常规种植等栽培模式",
                examples: "有机认证、无农药、种植密度管理"
            },
            4: {
                title: "生长年限与采收时间",
                desc: "药材的生长年份、采收季节、采收时机",
                examples: "3年vs1年、霜降后采收、头茬果"
            },
            5: {
                title: "药材规格与部位",
                desc: "等级划分、部位选择、规格标准",
                examples: "特级vs一级、根vs茎vs叶、果实大小"
            },
            6: {
                title: "产地加工与炮制",
                desc: "产地初加工、传统炮制工艺、古法制作",
                examples: "九蒸九晒、柴火慢蒸、手工切片"
            }
        };

        const cards = document.querySelectorAll('.dimension-card');
        const countEl = document.getElementById('count');
        const btnConfirm = document.getElementById('btnConfirm');

        cards.forEach(card => {
            card.addEventListener('click', function() {
                const checkbox = this.querySelector('input[type="checkbox"]');
                const selectedCount = document.querySelectorAll('.dimension-card.selected').length;

                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    checkbox.checked = false;
                } else {
                    if (selectedCount >= 3) {
                        alert('最多只能选择3个维度！');
                        return;
                    }
                    this.classList.add('selected');
                    checkbox.checked = true;
                }

                updateCount();
            });
        });

        function updateCount() {
            const selectedCount = document.querySelectorAll('.dimension-card.selected').length;
            countEl.textContent = selectedCount;
            btnConfirm.disabled = selectedCount === 0;
        }

        function confirmSelection() {
            const selected = document.querySelectorAll('.dimension-card.selected');
            if (selected.length === 0) return;

            const resultDiv = document.getElementById('result');
            const resultItems = document.getElementById('resultItems');
            const outputText = document.getElementById('outputText');

            resultItems.innerHTML = '';
            let outputLines = ['请基于以下供应链维度，为我的产品生成详情页文案：', ''];

            selected.forEach((card, index) => {
                const id = card.dataset.id;
                const data = dimensionData[id];

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="title">维度${id}：${data.title}</div>
                    <div class="desc">${data.desc}（${data.examples}）</div>
                `;
                resultItems.appendChild(item);

                outputLines.push(`${index + 1}. ${data.title} —— ${data.desc}`);
            });

            outputLines.push('');
            outputLines.push('请执行四步法工作流：维度假定→反向挖掘→人工择向→多维度论证，输出板块制详情页文案。');

            outputText.value = outputLines.join('\n');
            resultDiv.classList.add('show');
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function copyText() {
            const textarea = document.getElementById('outputText');
            textarea.select();
            document.execCommand('copy');
            alert('已复制到剪贴板！');
        }

        function resetSelection() {
            cards.forEach(card => {
                card.classList.remove('selected');
                card.querySelector('input[type="checkbox"]').checked = false;
            });
            updateCount();
            document.getElementById('result').classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
